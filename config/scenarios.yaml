# 침상 케어 로봇 — 4대 핵심 기능 (단위: mm, deg)

motion:
  home_joint: [0.0, 0.0, 90.0, 0.0, 90.0, 0.0]
  joint_vel: 25
  joint_acc: 25
  task_vel: [60, 30]
  task_acc: [120, 60]
  pour_vel: [40, 20]
  pour_acc: [80, 40]
  approach_height_mm: 80
  retreat_height_mm: 100
  retry_count: 2

gripper:
  driver: onrobot_rg2   # Modbus TCP 직접 제어 — OnRobotRGControllerServer 불필요
  # driver: onrobot_ros  # (대체) /onrobot/sendCommand 서비스 — bringup 별도 실행 필요
  modbus_ip: 192.168.1.1
  modbus_port: 502
  changer_addr: 65
  force: 400
  settle_time_sec: 0.8
  motion_timeout_sec: 6.0
  joint_states_topic: /gripper_joint_states
  finger_joint_name: rg2_finger_joint
  open_joint_position: -0.558505
  closed_joint_position: 0.785398
  joint_position_tolerance: 0.04

safety:
  enabled: true
  monitor_interval_sec: 0.1
  external_torque_max_norm: 30.0
  messages:
    external_force: "외력이 감지되어 동작을 중단했습니다. 환자·물체 접촉 여부를 확인해 주세요."
    unsafe_robot_state: "로봇이 안전 정지 상태입니다. 티칭 팬던트 알람을 확인해 주세요."
    motion_failed: "동작 실행에 실패했습니다. 로봇 상태를 확인해 주세요."

# 1. 페트병 뚜껑 열기 (툴 +Z 상대 이동 방식)
open_bottle:
  # start_joint: 병 뚜껑 최상단에서 5cm 위, 그리퍼 수직 하향 자세
  # [티칭] 팬던트로 이 위치를 잡고 조인트값 저장 후 아래 값 갱신
  start_joint: [0.29, 1.68, 74.79, -0.04, 103.54, 10.21]

  # 파지 하강 거리 (툴 +Z, mm)
  # start_joint(병 위 5cm)에서 뚜껑 파지 위치까지 내려가는 거리
  # 예: 접근 높이 50mm + 뚜껑 파지 깊이 10mm = 60mm
  grasp_descent_mm: 79.0

  # 파지/개봉/내려놓기 등 섬세 작업 속도 (느릴수록 위치 정밀도↑)
  grasp_vel: [15, 10]
  grasp_acc: [30, 15]

  # 일반 이동(빠름) 속도 — 섬세 작업 외 전부 이 속도
  fast_vel: [80, 60]
  fast_acc: [200, 150]
  fast_joint_vel: 60.0
  fast_joint_acc: 60.0

  # 뚜껑 개봉 파라미터
  twist_angle_deg: -200.0  # 총 회전각 (deg, 음수 = 열리는 방향)
  twist_steps: 8            # 단계 수
  twist_rise_mm: 5.0        # 개봉 중 상승 거리 (나사산 피치, mm)
  cap_lift_mm: 30.0         # 개봉 후 추가 들어올리기 (mm, 툴 -Z)

  # 뚜껑 내려놓기 위치: home([0,0,90,0,90,0]) TCP 기준 X+0/Y-20 바닥
  # cap_place_floor_z_mm: 뚜껑 잡은 그리퍼가 바닥에 닿는 Z(mm). 이 값 이하로 절대 내려가지 않음
  cap_place_floor_z_mm: 237.0
  cap_place_approach_z_mm: 50.0

# 1-2. 페트병 뚜껑 닫기 (open_bottle 역순) — 뚜껑이 바닥에 놓여 있다고 가정
# open_bottle 과 동일한 좌표/파라미터를 사용해야 같은 위치에서 뚜껑을 집는다.
close_bottle:
  start_joint: [0.29, 1.68, 74.79, -0.04, 103.54, 10.21]
  grasp_descent_mm: 79.0
  grasp_vel: [15, 10]       # 섬세 작업용(느림)
  grasp_acc: [30, 15]
  fast_vel: [80, 60]        # 일반 이동(빠름)
  fast_acc: [200, 150]
  fast_joint_vel: 60.0
  fast_joint_acc: 60.0
  twist_angle_deg: -200.0   # open_bottle 과 동일 (닫기는 코드에서 부호 반전, 2스텝 적게 조임)
  twist_steps: 8
  twist_rise_mm: 5.0        # 나사산 피치 (닫기 시 동일 거리만큼 하강)
  grip_force: 100.0         # 바닥 뚜껑 약파지 힘(낮을수록 뚜껑 변형↓, 최대 ~400)
  floor_pick_extra_mm: 5.0  # 바닥 뚜껑 파지 시 floor_z 보다 더 내려가는 깊이(약 0.5cm)
  cap_place_floor_z_mm: 237.0
  cap_place_approach_z_mm: 50.0

# 기본 위치 복귀
go_home:
  open_gripper: true
  retreat_z_mm: 80

# 2. 물 따르기
pour_water:
  bottle_pose: [400.0, -200.0, 360.0, 180.0, 0.0, 90.0]
  cup_pose: [400.0, -80.0, 300.0, 180.0, 0.0, 90.0]
  grasp_offset_z_mm: 45
  pour_height_above_cup_mm: 130
  pour_tilt_deg: 50.0
  pour_duration_sec: 3.0
  pre_pour_pause_sec: 0.5
  return_bottle: true

# 3. 알약 서랍 → 옮기기
pick_place_pill:
  drawer_pose: [350.0, -220.0, 280.0, 180.0, 0.0, 90.0]
  place_pose: [480.0, -100.0, 310.0, 180.0, 0.0, 90.0]
  drawer_approach_z_mm: 90
  pick_depth_mm: 12
  place_depth_mm: 8
  drawer_pull_back_mm: 15

# 4. 스마트폰 무선충전기 (놓기 / 가져오기)
place_on_charger:
  phone_pose: [520.0, -80.0, 295.0, 180.0, 0.0, 90.0]
  charger_pose: [380.0, -160.0, 305.0, 180.0, 0.0, 90.0]
  approach_z_mm: 70
  grasp_depth_mm: 6
  place_depth_mm: 4

pick_from_charger:
  phone_pose: [520.0, -80.0, 295.0, 180.0, 0.0, 90.0]
  charger_pose: [380.0, -160.0, 305.0, 180.0, 0.0, 90.0]
  approach_z_mm: 70
  grasp_depth_mm: 4
  place_depth_mm: 6
