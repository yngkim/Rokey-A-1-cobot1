# 침상 케어 로봇 — 4대 핵심 기능 (단위: mm, deg)

motion:
  home_joint: [0.0, 0.0, 90.0, 0.0, 90.0, 0.0]
  joint_vel: 25
  joint_acc: 25
  task_vel: [60, 30]
  task_acc: [120, 60]
  pour_vel: [40, 20]
  pour_acc: [80, 40]
  approach_height_mm: 80
  retreat_height_mm: 100
  retry_count: 2

gripper:
  driver: onrobot_ros   # m0609_rg2_bringup 그리퍼 서비스 (/onrobot/sendCommand)
  # driver: onrobot_rg2  # (대체) Modbus 직접 — bringup 그리퍼와 동시 사용 금지
  modbus_ip: 192.168.1.1
  modbus_port: 502
  changer_addr: 65
  force: 400
  settle_time_sec: 0.3
  motion_timeout_sec: 6.0
  joint_states_topic: /gripper_joint_states
  finger_joint_name: rg2_finger_joint
  open_joint_position: -0.558505
  closed_joint_position: 0.785398
  joint_position_tolerance: 0.04

safety:
  enabled: true
  monitor_interval_sec: 0.1
  external_torque_max_norm: 30.0
  messages:
    external_force: "외력이 감지되어 동작을 중단했습니다. 환자·물체 접촉 여부를 확인해 주세요."
    unsafe_robot_state: "로봇이 안전 정지 상태입니다. 티칭 팬던트 알람을 확인해 주세요."
    motion_failed: "동작 실행에 실패했습니다. 로봇 상태를 확인해 주세요."

# 1. 페트병 뚜껑 열기 (수직 하강 + 외력 토크로 뚜껑 높이 탐색)
open_bottle:
  # 홈 [0,0,90,0,90,0] 에서 툴 수직 올린 탐색 시작 조인트 (티칭값)
  start_joint: [0.29, 1.68, 74.79, -0.04, 103.54, 10.21]
  bottle_pose: [420.0, -180.0, 340.0, 180.0, 0.0, 90.0]  # cap_place 등 보조용
  use_contact_search: true
  search_max_descent_mm: 130.0            # 시작 위치에서 최대 하강 (mm)
  contact_force_z_threshold: 8.0    # 뚜껑 접촉 ΔFz (기준선 대비, N) — 만났을 때 정지
  contact_max_force_z: 22.0         # ΔFz 상한 — 초과 시 즉시 정지 (병 찌그러짐 방지)
  contact_baseline_samples: 8       # 하강 전 힘 평균 샘플 수
  contact_settle_sec: 0.4           # 그리퍼 닫힌 후 안정화
  contact_step_mm: 0.5             # 접촉 근처 미세 하강 (mm)
  contact_coarse_step_mm: 2.0       # 접촉 전 빠른 하강 (mm)
  contact_coarse_travel_mm: 60.0    # 이 거리까지 coarse, 이후 fine
  contact_retreat_mm: 5.0          # 접촉 후 최소 Z+ 리트릿 (mm)
  gripper_open_clearance_mm: 20.0  # 그리퍼 열기 전 Z+ (뚜껑·손가락 간섭 방지)
  cap_touch_to_grasp_z_mm: 0.0     # 접촉 Z = 잡기 Z (필요 시 mm 보정)
  probe_vel: [15, 10]              # coarse 하강 속도
  probe_acc: [30, 15]
  probe_fine_vel: [6, 4]           # 접촉 근처 미세 하강 속도
  probe_fine_acc: [12, 8]
  cap_approach_z_mm: 70
  cap_grasp_z_mm: 12
  twist_angle_deg: 200.0
  twist_steps: 8
  twist_down_mm: 4
  cap_lift_mm: 30
  cap_place_pose: [450.0, -250.0, 295.0, 180.0, 0.0, 90.0]
  cap_place_approach_z_mm: 50
  cap_place_depth_mm: 5

# 기본 위치 복귀
go_home:
  open_gripper: true
  retreat_z_mm: 80

# 2. 물 따르기
pour_water:
  bottle_pose: [400.0, -200.0, 360.0, 180.0, 0.0, 90.0]
  cup_pose: [400.0, -80.0, 300.0, 180.0, 0.0, 90.0]
  grasp_offset_z_mm: 45
  pour_height_above_cup_mm: 130
  pour_tilt_deg: 50.0
  pour_duration_sec: 3.0
  pre_pour_pause_sec: 0.5
  return_bottle: true

# 3. 알약 서랍 → 옮기기
pick_place_pill:
  drawer_pose: [350.0, -220.0, 280.0, 180.0, 0.0, 90.0]
  place_pose: [480.0, -100.0, 310.0, 180.0, 0.0, 90.0]
  drawer_approach_z_mm: 90
  pick_depth_mm: 12
  place_depth_mm: 8
  drawer_pull_back_mm: 15

# 4. 스마트폰 무선충전기 (놓기 / 가져오기)
place_on_charger:
  phone_pose: [520.0, -80.0, 295.0, 180.0, 0.0, 90.0]
  charger_pose: [380.0, -160.0, 305.0, 180.0, 0.0, 90.0]
  approach_z_mm: 70
  grasp_depth_mm: 6
  place_depth_mm: 4

pick_from_charger:
  phone_pose: [520.0, -80.0, 295.0, 180.0, 0.0, 90.0]
  charger_pose: [380.0, -160.0, 305.0, 180.0, 0.0, 90.0]
  approach_z_mm: 70
  grasp_depth_mm: 4
  place_depth_mm: 6
