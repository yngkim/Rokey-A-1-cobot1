# 침상 케어 로봇 — 4대 핵심 기능 (단위: mm, deg)

motion:
  home_joint: [0.0, 0.0, 90.0, 0.0, 90.0, 0.0]
  joint_vel: 25
  joint_acc: 25
  task_vel: [60, 30]
  task_acc: [120, 60]
  pour_vel: [40, 20]
  pour_acc: [80, 40]
  approach_height_mm: 80
  retreat_height_mm: 100
  home_lift_clearance_mm: 150.0
  home_carry_vel: [25, 20]
  home_carry_acc: [50, 40]
  home_descend_vel: [15, 10]
  home_descend_acc: [30, 20]
  retry_count: 2

gripper:
  driver: onrobot_rg2   # Modbus TCP 직접 제어 — OnRobotRGControllerServer 불필요
  # driver: onrobot_ros  # (대체) /onrobot/sendCommand 서비스 — bringup 별도 실행 필요
  modbus_ip: 192.168.1.1
  modbus_port: 502
  changer_addr: 65
  force: 400
  settle_time_sec: 2.0
  motion_timeout_sec: 8.0
  joint_states_topic: /gripper_joint_states
  finger_joint_name: rg2_finger_joint
  open_joint_position: -0.558505
  closed_joint_position: 0.785398
  joint_position_tolerance: 0.04

safety:
  enabled: true
  monitor_interval_sec: 0.1
  external_torque_max_norm: 50.0
  messages:
    external_force: "외력이 감지되어 동작을 중단했습니다. 환자·물체 접촉 여부를 확인해 주세요."
    unsafe_robot_state: "로봇이 안전 정지 상태입니다. 티칭 팬던트 알람을 확인해 주세요."
    motion_failed: "동작 실행에 실패했습니다. 로봇 상태를 확인해 주세요."

# 물병 작업 공유 포즈 (TCP posx [x,y,z,rx,ry,rz], mm/deg) — open/pour/close 공용
# 픽앤플레이스는 항상 베이스 Z 상승 → XY 수평 → 베이스 Z 하강, 이송 중 자세(rx,ry,rz) 고정
water_poses:
  water_cap_grasp:      [214.21, -227.51, 415.81, 167.66, 179.83, -170.72]  # pos1 초기 물통, 뚜껑 파지
  cupholder_cap_grasp:  [370.53, 9.49, 427.25, 8.57, -178.27, 29.68]        # pos2 컵홀더, 뚜껑 파지=놓기=개폐
  cupholder_cap_open_start:  [369.46, 10.81, 431.21, 72.00, -179.72, 81.69]  # 개봉 직전 TCP
  cupholder_cap_close_start: [369.46, 5.81, 431.21, 72.00, -179.72, 81.69]   # 조임 직전 TCP
  cupholder_body_grasp: [371.76, 208.58, 141.88, 88.74, -96.89, 86.74]      # pos3 몸통(측면) 파지
  cup_pour_upright:     [621.23, 223.91, 254.59, 89.72, -90.03, 94.44]      # pos4 컵 옆, 세운 상태
  cup_pour_tilt:        [629.58, 219.77, 237.85, 92.95, -98.99, 37.36]      # pos5 최대 기울임
  lift_clearance_mm: 120.0   # 픽앤플레이스 시 베이스 Z 상승 여유
  bottle_height_offset_mm: 13.0  # 새 물병이 기존 대비 약 1.3cm 높음 (open/pour/close 공용 Z 보정)
  cap_grasp_extra_descent_mm: 4.0  # 뚜껑 파지 시 티칭 Z 대비 추가 하강 (open/close 공용)

# 1. 페트병 뚜껑 열기 (툴 +Z 상대 이동 방식)
open_bottle:
  # start_joint: 병 뚜껑 최상단에서 5cm 위, 그리퍼 수직 하향 자세
  # [티칭] 팬던트로 이 위치를 잡고 조인트값 저장 후 아래 값 갱신
  start_joint: [0.29, 1.68, 74.79, -0.04, 103.54, 10.21]

  # 파지 하강 거리 (툴 +Z, mm)
  # start_joint(병 위 5cm)에서 뚜껑 파지 위치까지 내려가는 거리
  # 예: 접근 높이 50mm + 뚜껑 파지 깊이 10mm = 60mm
  grasp_descent_mm: 79.0

  # 파지/개봉/내려놓기 등 섬세 작업 속도 (느릴수록 위치 정밀도↑)
  grasp_vel: [15, 10]
  grasp_acc: [30, 15]

  # 일반 이동(빠름) 속도 — 섬세 작업 외 전부 이 속도
  fast_vel: [80, 60]
  fast_acc: [200, 150]
  fast_joint_vel: 60.0
  fast_joint_acc: 60.0

  # 뚜껑 개봉 파라미터
  twist_angle_deg: -323.1  # 총 회전각 (9스텝, 10→9)
  twist_steps: 9            # 단계 수
  twist_rise_mm: 8.0        # 개봉 중 상승 거리
  cap_lift_mm: 30.0         # 개봉 후 베이스 Z 수직 들어올리기 (mm)
  cap_grasp_force: 400.0              # 개봉 직전 재파지 힘 (gripper.force)
  cap_grasp_force_after_open: 100.0    # 개봉 후 재파지 힘 (75% 감소, 바닥까지 유지)
  cap_grasp_regrasp_wait_sec: 2.0     # 약파지 후 대기(초)
  cap_release_open_force: 80.0        # 개봉 후 재파지 전 그리퍼 열기 힘 (낮을수록 부드러움)
  cap_release_open_steps: 6           # 열기 단계 수 (많을수록 천천히)
  cap_release_open_step_pause_sec: 0.4 # 단계마다 대기(초)
  pre_release_descent_mm: 5.0         # 개봉 후 재파지 전 베이스 Z 하강 (mm)

  # 뚜껑 내려놓기 위치: home([0,0,90,0,90,0]) TCP 기준 X+0/Y-20 바닥
  # cap_place_floor_z_mm: 뚜껑 잡은 그리퍼가 바닥에 닿는 Z(mm). 이 값 이하로 절대 내려가지 않음
  cap_place_floor_z_mm: 237.0
  cap_place_approach_z_mm: 50.0
  cap_place_extra_descent_mm: 2.0  # 바닥 안착 시 floor_z 대비 추가 하강 후 그리퍼 열기
  holder_place_extra_mm: 11.0  # 컵홀더 안착 시 티칭 Z 보다 더 하강 (+5mm: 6→11)
  regrasp_lift_mm: 100.0       # 병 놓은 뒤 재파지·개봉 전 수직 상승(약 10cm)
  open_grasp_extra_descent_mm: 8.0  # 개봉 직전 재파지 시 티칭 Z 대비 추가 하강(약 0.8cm)

# 1-2. 페트병 뚜껑 닫기 (open_bottle 역순) — 뚜껑이 바닥에 놓여 있다고 가정
# open_bottle 과 동일한 좌표/파라미터를 사용해야 같은 위치에서 뚜껑을 집는다.
close_bottle:
  start_joint: [0.29, 1.68, 74.79, -0.04, 103.54, 10.21]
  grasp_descent_mm: 79.0
  grasp_vel: [15, 10]       # 섬세 작업용(느림)
  grasp_acc: [30, 15]
  fast_vel: [80, 60]        # 일반 이동(빠름)
  fast_acc: [200, 150]
  fast_joint_vel: 60.0
  fast_joint_acc: 60.0
  twist_angle_deg: -323.1   # open_bottle 과 동일 (닫기는 코드에서 부호 반전)
  twist_steps: 9
  twist_rise_mm: 8.0         # 나사산 피치 (닫기 시 동일 거리만큼 하강)
  screw_close_add_steps: 1    # 조임 회전 스텝 추가 (기본 twist_steps-2=7 → 8스텝, 이전 대비 -4)
  grip_force: 100.0         # 바닥 뚜껑 약파지 힘(낮을수록 뚜껑 변형↓, 최대 ~400)
  grasp_settle_sec: 2.0     # 약파지 후 상승 전 대기(그리퍼 완전히 닫힐 때까지, RG2 피드백 없음)
  regrasp_force: 400.0      # 닫은 뒤 물병 이송 전 뚜껑 강파지 힘(미끄럼 방지)
  drop_clearance_mm: 10.0   # 병 입구 위 떨어뜨릴 높이(약 1cm)
  floor_pick_extra_mm: 5.0  # 바닥 뚜껑 파지 시 floor_z 보다 더 내려가는 깊이(약 0.5cm)
  floor_pick_raise_mm: 2.0   # 바닥 파지 Z 보정 (올림, mm)
  water_place_offset_z_mm: 5.0  # 닫은 뒤 초기 위치 내려놓기 Z 여유(외력 감지 방지)
  screw_start_offset_x_mm: -3.0  # 조임 하강/회전 X 평행이동 (-3mm, cupholder_cap_close_start 기준)
  screw_start_offset_y_mm: 3.0   # 조임 하강/회전 Y 평행이동 (+3mm)
  screw_close_joint: [1.43, -0.38, 87.49, -0.91, 92.13, 249.24]  # 조임 직전 조인트(deg) → fkin TCP 목표
  # 사전 정렬 (조임 전: 살살 놓기 → 상승 → 중앙 누르기)
  cap_preseat_open_force: 80.0
  cap_preseat_open_steps: 6
  cap_preseat_open_pause_sec: 0.4
  cap_preseat_lift_mm: 80.0
  cap_press_approach_z_mm: 25.0
  cap_press_force_threshold_z: 35.0   # ΔFz 정지 (N)
  cap_press_max_force_z: 38.0
  cap_press_step_mm: 0.3
  cap_press_vel: [3, 2]
  cap_press_acc: [6, 4]
  cap_press_max_travel_mm: 40.0
  cap_screw_grasp_force: 400.0
  cap_screw_grasp_wait_sec: 2.0
  # J6 가드 조임 (한계 근접 시 그리퍼 열고 J6 복원 후 재파지)
  screw_j6_abs_limit_deg: 170.0
  screw_j6_delta_limit_deg: 120.0
  screw_j6_restore_deg: 249.24
  screw_j6_unwind_joint_vel: 15.0
  cap_place_floor_z_mm: 237.0
  cap_place_approach_z_mm: 50.0

# 기본 위치 복귀
go_home:
  open_gripper: true
  lift_clearance_mm: 150.0

# 2. 물 따르기 (open_bottle 직후, 물병이 컵홀더에 개봉된 채 꽂혀 있다고 가정)
# 포즈는 조인트 각도(deg). 컵/복귀 이송은 fkin TCP + Z↑→XY→Z↓
pour_water:
  body_grasp_joint: [-41.99, 44.05, 101.32, 52.69, 112.6, -63.1]   # 컵홀더 몸통 파지
  body_grasp_z_offset_mm: -40.0   # 몸통 파지 TCP Z 추가 하강 (나머지 포즈는 동일)
  body_grasp_y_offset_mm: 10.0    # 몸통 파지 TCP Y 추가 이동 (+1cm)
  cup_side_joint:      [19.84, 35.26, 116.6, 106.22, 81.39, -63.12]    # 컵 옆 세운 상태
  cup_pour_tilt_joint: [19.84, 35.26, 116.6, 106.22, 81.39, -180.12]   # 컵 옆 최대 기울임
  # pour_tilt_delta_j6_deg: 미지정 시 cup_pour_tilt_joint J6 − cup_side_joint J6
  pour_j6_pre_rotate_vel: 10.0   # align_body_grasp / align_cup_joints 속도
  pour_j6_pre_rotate_acc: 10.0
  pour_j6_restore_vel: 60.0       # 붓기 후 J6 복원 속도
  pour_j6_restore_acc: 60.0
  pour_fast_zone_deg: 30.0       # 입구 구간(0↔±30, ±135↔±105) 빠른 기울임 각도
  pour_joint_vel: 8.0            # 느린 구간 속도
  pour_joint_acc: 8.0
  pour_fast_joint_vel: 30.0      # 빠른 구간 속도
  pour_fast_joint_acc: 30.0
  approach_joint_vel: 10.0
  approach_joint_acc: 10.0
  grasp_vel: [15, 10]
  grasp_acc: [30, 15]
  fast_vel: [80, 60]
  fast_acc: [200, 150]
  fast_joint_vel: 60.0
  fast_joint_acc: 60.0
  body_grip_force: 170.0              # 초기 몸통 파지 힘 (~17N, RG2 0.1N 단위)
  body_grip_width_units: 0            # 목표 너비(0.01mm). 0=완전 닫힘
  body_grasp_settle_sec: 4.5            # 초기 파지 최소 대기(초) + busy 해제
  pour_duration_sec: 3.0
  pre_pour_pause_sec: 0.5

# 3. 알약 서랍 → 옮기기 (조인트 deg, 티칭값)
pick_place_pill:
  drawer_grasp_joint:  [-8.1, 40.74, 108.1, -3.4, -58.88, 1.65]   # 서랍 손잡이 파지
  drawer_pulled_joint: [-9.71, 30.83, 133.33, -4.39, -74.03, 1.19]  # 서랍 당긴 후
  pill_above_joint:    [18.86, 14.23, 104.58, -117.22, -49.04, 83.46]  # 약통 위 (덤프 기준)
  cabinet_top_joint:    [-7.98, 29.54, 106.28, -3.74, -46.16, 2.36]   # 서랍장 위 접근
  cabinet_place_joint:  [-8.0, 32.31, 106.91, -3.74, -49.44, 2.27]   # 서랍장 위 내려놓기
  cabinet_retract_joint: [-8.35, 26.43, 117.68, -3.85, -54.17, 2.20] # 놓은 뒤 후퇴
  dump_tilt_delta_j6_deg: -180.0  # 서랍 뒤집어 약 봉지 덤프
  dump_duration_sec: 2.0         # 봉지 떨어질 때까지 대기
  dump_joint_vel: 8.0
  dump_joint_acc: 8.0
  lift_clearance_mm: 120.0
  drawer_grip_force: 100.0
  drawer_grasp_settle_sec: 4.5
  # 서랍 당김 ~ 약 놓기
  carry_joint_vel: 15.0   # pull_drawer (조인트)
  carry_joint_acc: 15.0
  carry_vel: [25, 20]     # 약통·서랍장 XY 이동 (TCP)
  carry_acc: [50, 40]
  place_vel: [5, 3]       # 서랍장 위 수직 하강·안착 (매우 느림)
  place_acc: [10, 6]
  retract_joint_vel: 8.0  # 놓은 뒤 후퇴
  retract_joint_acc: 8.0
  # 놓기 후 ~ home 복귀 (느림)
  return_joint_vel: 15.0
  return_joint_acc: 15.0
  return_vel: [25, 20]
  return_acc: [50, 40]
  # 초기 접근·home 준비 (빠름)
  fast_joint_vel: 60.0
  fast_joint_acc: 60.0
  grasp_vel: [15, 10]
  grasp_acc: [30, 15]
  fast_vel: [80, 60]
  fast_acc: [200, 150]

# 4. 스마트폰 무선충전기 (가져오기 / 가져다놓기) — 조인트 deg, RG2 force 0.1N, width 0.01mm
_phone_charger_common: &phone_charger_common
  charger_approach_j5_joint: [0.0, 0.0, 90.0, 0.0, -47.67, 0.0]
  charger_approach_j4_joint: [0.0, 0.0, 90.0, 104.24, -47.67, 0.0]
  charger_approach_prepose_joint: [12.35, 11.61, 109.5, 104.24, -47.67, 27.85]
  charger_grasp_joint: [-3.61, 34.37, 94.21, 89.66, -34.25, 35.38]
  user_handoff_joint: [30.91, 24.51, 88.49, 17.75, 5.03, -111.1]
  grip_force: 300              # 30N (0.1N 단위)
  grip_settle_sec: 3.0
  nudge_force_delta: 8.0            # N — baseline 대비 TCP X/Y/Z 증가량
  nudge_hold_sec: 0.4
  nudge_settle_sec: 1.0               # 순응 안정화 대기(초)
  nudge_timeout_sec: 120.0          # pick 인계 대기 최대(초), place는 0=무제한
  handoff_grasp_timeout_sec: 0      # place: 사용자 앞 대기 — 0=시간 제한 없음
  nudge_poll_sec: 0.05
  nudge_baseline_samples: 18
  nudge_baseline_interval_sec: 0.08
  handoff_auto_release_sec: 15.0  # pick: 인계 대기 후 자동 진행(초)
  handoff_compliance_stiffness: [40, 40, 40, 60, 60, 60]  # TCP X/Y/Z 순응 (인계 nudge)
  handoff_compliance_ref: 1        # DR_TOOL — Nudge 인계 순응 좌표계
  compliance_stiffness: [800, 800, 40, 60, 60, 60]
  compliance_ramp_sec: 0.5
  home_joint_vel: 12.0
  home_joint_acc: 12.0
  approach_joint_vel: 12.0
  approach_joint_acc: 12.0
  charger_grasp_approach_joint_vel: 5.0   # 준비포즈 → 핸드폰 앞 (느림)
  charger_grasp_approach_joint_acc: 5.0
  carry_joint_vel: 10.0
  carry_joint_acc: 10.0
  handoff_return_joint_vel: 18.0   # 인계 후 복귀 (준비포즈→J4→J5)
  handoff_return_joint_acc: 18.0
  return_home_joint_vel: 12.0
  return_home_joint_acc: 12.0
  lift_clearance_mm: 150.0
  post_grasp_lift_mm: 200.0      # 거치대 파지 후 수직 상승 (mm)
  carry_lift_clearance_mm: 200.0 # 파지 후 이송 시 Z 회피 높이
  carry_vel: [20, 15]
  carry_acc: [40, 30]
  descend_vel: [12, 8]
  descend_acc: [24, 16]

pick_from_charger:
  <<: *phone_charger_common
  charger_grasp_joint: [-4.39, 34.79, 95.87, 77.0, -34.75, 35.33]
  charger_grasp_tcp_z_advance_mm: 5.0   # 파지 전 TCP Z +0.5cm
  nudge_force_delta: 6.4              # 공통 8.0N 대비 20% 낮춤 — 인계(받기) 감지

place_on_charger:
  <<: *phone_charger_common
  nudge_force_delta: 4.0              # 그리퍼 열린 채 인계 감지
  charger_front_joint: [-2.8, 29.27, 87.8, 111.76, -38.5, 0.66]       # 거치대 앞
  charger_place_joint: [-4.39, 34.79, 95.87, 77.0, -34.75, 35.33]    # 거치대 놓기
  charger_place_return_joint_vel: 24.0   # 거치대 놓고 복귀 (준비→J4→J5)
  charger_place_return_joint_acc: 24.0
  charger_place_home_joint_vel: 20.0     # 최종 home
  charger_place_home_joint_acc: 20.0

# 5. 식판 무게 측정 (식전/식후 % 섭취율) — 파지 후 Z 상승(post_grasp_carry_lift_mm) 뒤 Fz 샘플
measure_tray_weight:
  weigh_joint: [30.91, 24.51, 88.49, 17.75, 5.03, -111.1]  # 초기값: user_handoff_joint, 현장 티칭 필요
  weigh_joint_vel: 10.0
  weigh_joint_acc: 10.0
  settle_sec: 2.0
  sample_count: 12
  sample_interval_sec: 0.08
  min_load_n: 2.0
  phase_mode: auto
  go_home_first: false
  care_user_id: patient_01

# 7. 식판 인계 (가져다주기 / 가져다놓기) — 조인트 deg
_tray_meal_common: &tray_meal_common
  tray_grasp_joint: [3.17, 22.17, 108.66, -89.7, 90.47, -49.19]
